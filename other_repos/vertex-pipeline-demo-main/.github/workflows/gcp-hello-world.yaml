name: wif-test  
on:
  workflow_dispatch:
    inputs:
      runs-on-group:
        description: 'The runner group to use'
        required: true
        type: string
        default: cvs-linux-self-hosted
      gcp-wif-provider:
        description: 'The GCP Workload Identity Federation provider'
        required: true
        type: string
        default: projects/1037010797476/locations/global/workloadIdentityPools/wif-pool-github-nonprod/providers/wif-pool-github-nonprod
      gcp-service-account:
        description: 'The GCP service account to impersonate'
        required: true
        type: string
        default: gchcb-hcm-cm-de-ontpd@anbc-dev-hcm-cm-de.iam.gserviceaccount.com
      gcp-bucketname:
        description: 'The GCP bucket name to access'
        required: true
        type: string
        default: 'hcm-cm-de-data-hcb-dev'
jobs:
  deploy:
    runs-on: self-hosted # Make sure your action is run on a self-hosted runner
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Authenticate to Google Cloud
      id: auth
      uses: 'google-github-actions/auth@ba79af03959ebeac9769e648f473a284504d9193'
      with:
        workload_identity_provider: ${{ inputs.gcp-wif-provider }}
        service_account: hcm-cm-github-wif-automation@css-dev-iam.iam.gserviceaccount.com
    
    - name: 'Setup Cloud SDK'
      uses: google-github-actions/setup-gcloud@77e7a554d41e2ee56fc945c52dfd3f33d12def9a

    - name: Get Google Token
      id: token
      run: |-
        gcloud info
        gcloud config list
        gcloud config set auth/impersonate_service_account ${{ inputs.gcp-service-account }}
    
    - name: Access GCS bucket
      run: |-
        gsutil ls gs://${{ inputs.gcp-bucketname }}