name: Run Pipeline Test Dec SA
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - dev
          - test
          - prod
        default: dev
      runs-on-group:
        description: 'The runner group to use'
        required: true
        type: string
        default: cvs-linux-self-hosted

jobs:
  run-pipeline:
    runs-on: self-hosted
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set environment variables
        shell: bash
        run: |
          if [ "${{ inputs.environment }}" == "prod" ]; then
            echo "PROJECT_ID=anbc-prod-hcm-cm-de" >> $GITHUB_ENV
            echo "REGION=us-east4" >> $GITHUB_ENV
            echo "PIPELINE_ROOT=gs://hcm-cm-de-dec-hcb-prod/vertex-test/" >> $GITHUB_ENV
            echo "ENCRYPTION_KEY=projects/cvs-key-vault-prod/locations/us-east4/keyRings/gkr-prod-us-east4/cryptoKeys/gk-anbc-prod-hcm-cm-de-us-east4" >> $GITHUB_ENV
            echo "TARGET_SERVICE_ACCOUNT=gchcb-hcm-cm-de-dec-onppp@anbc-prod-hcm-cm-de.iam.gserviceaccount.com" >> $GITHUB_ENV
            echo "WIF_PROVIDER=projects/46504011566/locations/global/workloadIdentityPools/wif-pool-github-prod/providers/wif-pool-github-prod" >> $GITHUB_ENV
            echo "WIF_SERVICE_ACCOUNT=hcm-cm-github-wif-automation@css-prod-iam.iam.gserviceaccount.com" >> $GITHUB_ENV
            echo "PIPELINE_FILE=src/Prod/python/prod-dec-maternity-vertex.py" >> $GITHUB_ENV
          elif [ "${{ inputs.environment }}" == "test" ]; then
            echo "PROJECT_ID=anbc-test-hcm-cm-de" >> $GITHUB_ENV
            echo "REGION=us-east4" >> $GITHUB_ENV
            echo "PIPELINE_ROOT=gs://hcm-cm-de-dec-hcb-test/vertex-test/" >> $GITHUB_ENV
            echo "ENCRYPTION_KEY=projects/cvs-key-vault-nonprod/locations/us-east4/keyRings/gkr-nonprod-us-east4/cryptoKeys/gk-anbc-test-hcm-cm-de-us-east4" >> $GITHUB_ENV
            echo "TARGET_SERVICE_ACCOUNT=gchcb-hcm-cm-de-dec-onppq@anbc-test-hcm-cm-de.iam.gserviceaccount.com" >> $GITHUB_ENV
            echo "WIF_PROVIDER=projects/1037010797476/locations/global/workloadIdentityPools/wif-pool-github-nonprod/providers/wif-pool-github-nonprod" >> $GITHUB_ENV
            echo "WIF_SERVICE_ACCOUNT=hcm-cm-github-wif-automation@css-dev-iam.iam.gserviceaccount.com" >> $GITHUB_ENV
            echo "PIPELINE_FILE=src/Prod/python/test-dec-maternity-vertex.py" >> $GITHUB_ENV
          else
            echo "PROJECT_ID=anbc-dev-hcm-cm-de" >> $GITHUB_ENV
            echo "REGION=us-east4" >> $GITHUB_ENV
            echo "PIPELINE_ROOT=gs://hcm-cm-de-dec-hcb-dev/vertex-test/" >> $GITHUB_ENV
            echo "ENCRYPTION_KEY=projects/cvs-key-vault-nonprod/locations/us-east4/keyRings/gkr-nonprod-us-east4/cryptoKeys/gk-anbc-dev-hcm-cm-de-us-east4" >> $GITHUB_ENV
            echo "TARGET_SERVICE_ACCOUNT=gchcb-hcm-cm-de-dec-ontpd@anbc-dev-hcm-cm-de.iam.gserviceaccount.com" >> $GITHUB_ENV
            echo "WIF_PROVIDER=projects/1037010797476/locations/global/workloadIdentityPools/wif-pool-github-nonprod/providers/wif-pool-github-nonprod" >> $GITHUB_ENV
            echo "WIF_SERVICE_ACCOUNT=hcm-cm-github-wif-automation@css-dev-iam.iam.gserviceaccount.com" >> $GITHUB_ENV
            echo "PIPELINE_FILE=src/Prod/python/dev-maternity-vertex.py" >> $GITHUB_ENV
          fi

      - name: Authenticate to Google Cloud
        id: auth
        uses: 'google-github-actions/auth@ba79af03959ebeac9769e648f473a284504d9193'
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
      
      - name: 'Setup Cloud SDK'
        uses: google-github-actions/setup-gcloud@77e7a554d41e2ee56fc945c52dfd3f33d12def9a

      - name: Set up impersonation and get access token
        id: impersonate
        run: |-
          gcloud config set auth/impersonate_service_account ${{ env.TARGET_SERVICE_ACCOUNT }}
          ACCESS_TOKEN=$(gcloud auth print-access-token)
          echo "::add-mask::$ACCESS_TOKEN"
          echo "access_token=$ACCESS_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Detect Python interpreter
        run: |-
          set -e
          if command -v python3 >/dev/null 2>&1; then
            PY=python3
          elif command -v python >/dev/null 2>&1; then
            PY=python
          else
            echo "Python not found on runner" >&2
            exit 1
          fi
          echo "Using Python interpreter: $PY"
          $PY --version
          echo "PYTHON_INTERPRETER=$PY" >> "$GITHUB_ENV"

      - name: Install Python dependencies
        run: |-
          "$PYTHON_INTERPRETER" -m pip install --upgrade pip
          "$PYTHON_INTERPRETER" -m pip install google-cloud-aiplatform kfp google-auth

      - name: Submit Vertex AI Pipeline via Python SDK
        env:
          GOOGLE_CLOUD_PROJECT: ${{ env.PROJECT_ID }}
          IMPERSONATED_SERVICE_ACCOUNT: ${{ env.TARGET_SERVICE_ACCOUNT }}
          PROJECT_ID: ${{ env.PROJECT_ID }}
          REGION: ${{ env.REGION }}
          PIPELINE_ROOT: ${{ env.PIPELINE_ROOT }}
          ENCRYPTION_KEY: ${{ env.ENCRYPTION_KEY }}
          TARGET_SERVICE_ACCOUNT: ${{ env.TARGET_SERVICE_ACCOUNT }}
          ACCESS_TOKEN: ${{ steps.impersonate.outputs.access_token }}
        run: |-
          "$PYTHON_INTERPRETER" run_pipeline.py
