bigquery:
  dataset: my_dataset
  features_table: features
  sql_path: sql/features.sql
  destination_table: my_dataset.features_output
  query_params:
    timeout_minutes: 60
    use_cache: true
    dry_run: false
training:
  machine_type:
    machine_type: n1-standard-4
    accelerator_type: null
    accelerator_count: 0
  image_config:
    base_image: gcr.io/my-gcp-project/ml-base
    image_tag: latest
  execution:
    file_to_run: py/train_xgboost.py
    args: []
    env_vars:
      PYTHONPATH: /opt/ml/code
      ML_FRAMEWORK: xgboost
  hyperparameters:
    learning_rate:
      type: double
      min: 0.001
      max: 0.3
      scale: log
    n_estimators:
      type: int
      min: 100
      max: 2000
      scale: linear
  tuning:
    parallel_trials: 2
    max_trials: 8
    max_failed_trials: 2
    optimization_goal: maximize
    primary_metric: f1_top_1_percent
evaluation:
  execution:
    timeout_minutes: 30
  data:
    id_column: id
    truth_column: label
    pred_column: prediction_score
    ground_truth_project: anbc-dev-hcm-cm-de
    ground_truth_dataset: my_dataset
    ground_truth_table: ground_truth
model_registry:
  model_name: ip_prediction_xgboost
  version_strategy: auto_increment
  description: XGBoost model for IP prediction
  approval:
    auto_approve: false
    required_metrics:
      f1_top_1_percent: 0.15
      roc_auc: 0.7
package:
